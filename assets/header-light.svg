<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" fill="none" role="img" aria-label="Ahmed Hannan — Full-stack and applied-ML developer">
  <defs>
    <radialGradient id="glowL" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(150 150) rotate(0) scale(560 360)">
      <stop offset="0" stop-color="#c5d642" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#c5d642" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#c5d642" stop-opacity="0"/>
    </radialGradient>
    <pattern id="gridL" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#0a0a0a" stroke-width="1" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="#f7f8f4"/>
  <rect width="1200" height="300" fill="url(#gridL)"/>
  <rect width="1200" height="300" fill="url(#glowL)"/>

  <!-- Accent bar (slightly deeper lime so it holds on a light field) -->
  <rect x="128" y="94" width="4" height="112" rx="2" fill="#a6bd1c"/>

  <text x="156" y="112"
    font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="14" letter-spacing="3.5" fill="#586b0d">FULL-STACK · APPLIED ML</text>

  <text x="154" y="170"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="60" font-weight="700" letter-spacing="-1" fill="#0a0a0a">Ahmed Hannan</text>

  <text x="156" y="206"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="21" fill="#5b5f57">Full-stack engineering with an applied-ML edge.</text>

  <text x="1072" y="206" text-anchor="end"
    font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="12" letter-spacing="2" fill="#c4c8bd">github.com/ahmed-hannan</text>
</svg>
